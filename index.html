<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskHuman</title>
    <!-- 关键内联样式：在外部 CSS 加载前就定好底色，避免加载间隙的白闪。
         prefers-color-scheme 会跟随系统，也会跟随被强制设定的窗口主题。
         macOS 走毛玻璃（vibrancy）：窗口透明，底色交给系统材质，故 body 透明。 -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1e1e1e;
        }
      }
      html.vibrancy {
        background: transparent !important;
      }
      html.vibrancy body {
        background: rgba(255, 255, 255, 0.3);
      }
      @media (prefers-color-scheme: dark) {
        html.vibrancy body {
          background: rgba(0, 0, 0, 0.3);
        }
      }
    </style>
    <script>
      // macOS 启用窗口毛玻璃：在首帧前置透明类，避免出现纯色底覆盖材质。
      try {
        if (/Mac/.test(navigator.userAgent)) {
          document.documentElement.classList.add("vibrancy");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
