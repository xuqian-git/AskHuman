name: release

# 由 tag 触发：编译 4 平台二进制 → 发布 npm（主包 + 平台子包）→ 创建 GitHub Release。
# 前置条件：仓库 Secrets 配置 NPM_TOKEN（npmjs automation token）。
# macOS 二进制用 Developer ID 签名（钥匙串密钥读取免弹框），需额外 Secrets：
#   MACOS_CERT_P12_BASE64   Developer ID Application 证书（含私钥）的 .p12 经 base64
#   MACOS_CERT_PASSWORD     导出 .p12 时设置的密码
#   MACOS_KEYCHAIN_PASSWORD CI 临时钥匙串的任意密码
# 发版流程：node scripts/bump-version.mjs X.Y.Z → 提交 → git tag vX.Y.Z → git push --tags

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 提供 Xcode 26 / macOS 26 SDK——Swift 语音桥用到 SpeechAnalyzer 等 26 专有 API，
          # 必须用 26 SDK 编译（部署目标仍 11.0 + if #available 弱链接，可在旧系统运行）。
          - os: macos-26
            target: aarch64-apple-darwin
          # x64 也在 arm64 runner 上交叉编译，避开稀缺/排队久的 Intel runner
          - os: macos-26
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true # 图标走 Git LFS，需拉取真实文件，否则 tauri 打包读到指针报「Invalid PNG signature」

      - name: Install Linux system deps (WebKitGTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --features custom-protocol

      # Sign macOS binaries with the Developer ID cert (explicit, from Secrets — no auto-detect) so
      # the keychain trusts them across updates (DR is cdhash-independent → secret reads stay
      # prompt-free for end users). Runs before upload so the published artifact is signed.
      - name: Sign macOS binary (Developer ID)
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          EXPECTED_TEAM_ID: DMJXDB9H6Q
        run: |
          set -euo pipefail
          BIN="src-tauri/target/${{ matrix.target }}/release/AskHuman"
          CERT_P12="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          # GitHub Secrets store text, so the .p12 is base64-encoded; decode it back to a file.
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode -o "$CERT_P12"
          # Import the cert into a throwaway keychain (Apple's recommended CI pattern).
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_P12" -P "$MACOS_CERT_PASSWORD" -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN"
          # The throwaway keychain holds exactly one identity → deterministic, explicit selection.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then echo "::error::no Developer ID Application identity found in keychain"; exit 1; fi
          # Fixed identifier keeps the keychain designated requirement cdhash-independent.
          codesign -i com.naituw.humaninloop --force --options runtime --timestamp --sign "$IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          codesign -dvv "$BIN" 2>&1 | tee "$RUNNER_TEMP/codesign.txt"
          grep -q "TeamIdentifier=$EXPECTED_TEAM_ID" "$RUNNER_TEMP/codesign.txt" \
            || { echo "::error::unexpected TeamIdentifier (want $EXPECTED_TEAM_ID)"; exit 1; }
          echo "signed $BIN as $IDENTITY"

      - uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/AskHuman
            src-tauri/target/${{ matrix.target }}/release/AskHuman.exe

  publish:
    name: publish npm + GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true # 与 build 保持一致；图标走 LFS

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Assemble platform packages and release assets
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./packaging/npm/humaninloop/package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "$VERSION" != "$TAG" ]; then
            echo "::error::tag ($TAG) 与主包版本 ($VERSION) 不一致，请先运行 scripts/bump-version.mjs"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mkdir -p release-assets
          declare -A MAP=(
            [aarch64-apple-darwin]="darwin-arm64 AskHuman"
            [x86_64-apple-darwin]="darwin-x64 AskHuman"
            [x86_64-pc-windows-msvc]="win32-x64 AskHuman.exe"
            [x86_64-unknown-linux-gnu]="linux-x64 AskHuman"
          )
          for target in "${!MAP[@]}"; do
            set -- ${MAP[$target]}
            subdir=$1; exe=$2
            src="artifacts/binary-$target/$exe"
            dest="packaging/npm/platforms/$subdir/bin"
            mkdir -p "$dest"
            cp "$src" "$dest/$exe"
            chmod +x "$dest/$exe"
            if [ "$exe" = "AskHuman.exe" ]; then
              (cd "$dest" && zip -q "$GITHUB_WORKSPACE/release-assets/AskHuman-$target-v$VERSION.zip" "$exe")
            else
              tar -czf "release-assets/AskHuman-$target-v$VERSION.tar.gz" -C "$dest" "$exe"
            fi
          done
          ls -la release-assets

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          NPM_TAG="latest"
          case "$VERSION" in *-*) NPM_TAG="next";; esac
          echo "publishing with dist-tag: $NPM_TAG"

          # 幂等发布：已存在的版本跳过（便于失败后重试，不会因 E409 中断）；
          # 每个之间留间隔，错开节奏以规避 npm 反垃圾的频率检测。
          publish_one() {
            local dir="$1" name existing
            name=$(node -p "require('./$dir/package.json').name")
            existing=$(npm view "$name@$VERSION" version 2>/dev/null || true)
            if [ -n "$existing" ]; then
              echo "skip $name@$VERSION (registry 已存在)"
              return 0
            fi
            (cd "$dir" && npm publish --access public --tag "$NPM_TAG")
            sleep 10
          }

          # 先发平台子包，主包最后发（主包 optionalDependencies 指向子包，需子包先就位）。
          for subdir in darwin-arm64 darwin-x64 win32-x64 linux-x64; do
            publish_one "packaging/npm/platforms/$subdir"
          done
          publish_one "packaging/npm/humaninloop"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
