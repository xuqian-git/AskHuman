name: ci

# 持续集成校验：PR / push / 手动触发时编译并跑测试，确保 4 平台可构建。
# 不负责发布；正式发布（npm 主包+子包 + GitHub Release）见 release.yml（由 tag 触发）。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 提供 Xcode 26 / macOS 26 SDK（Swift 语音桥用到 macOS 26 专有 API，需 26 SDK 编译）。
          - os: macos-26
            target: aarch64-apple-darwin
          # x64 也在 arm64 runner 上交叉编译，避开稀缺/排队久的 Intel runner
          - os: macos-26
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true # 图标走 Git LFS，需拉取真实文件，否则 tauri 打包读到指针报「Invalid PNG signature」

      - name: Install Linux system deps (WebKitGTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: cargo test (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo build (release)
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --features custom-protocol

      - uses: actions/upload-artifact@v6
        with:
          name: ci-binary-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/AskHuman
            src-tauri/target/${{ matrix.target }}/release/AskHuman.exe
