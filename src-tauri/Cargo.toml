[package]
name = "humaninloop"
version = "0.1.0"
description = "HumanInLoop - Human-in-the-loop interaction tool (Rust + Tauri)"
authors = ["Naituw"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"
default-run = "AskHuman"

[[bin]]
name = "AskHuman"
path = "src/main.rs"

[features]
# 生产构建（直接 `cargo build --release`，不经 tauri CLI）必须启用此特性：
# 否则 tauri 的 build.rs 判定 dev=true，二进制会去连 devUrl(localhost) 而非内嵌资源，导致白屏。
# 注意：`pnpm tauri dev` 不启用此特性，仍走 dev server 热重载。请勿移除。
custom-protocol = ["tauri/custom-protocol"]

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
dirs = "5"
base64 = "0.22"
anyhow = "1"
thiserror = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net"] }
# 检测系统深/浅色，用于 system 主题下给窗口设置正确底色（消除白闪）。
# Linux 端依赖（zbus）仅在 Linux 目标编译，不影响 macOS 编译速度。
dark-light = "2"

[dev-dependencies]
tempfile = "3"

# Unix 下用于在进入 GUI 事件循环前静默系统噪音日志（重定向 stderr）。
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# 较快的 release 配置（不启用 LTO，避免原 Rust 版的慢链接）。
# 编译性能将在功能完成后专门评测（见 docs/plans/rust-tauri.md §21）。
[profile.release]
opt-level = "z"
codegen-units = 16
incremental = true
strip = true
panic = "abort"
